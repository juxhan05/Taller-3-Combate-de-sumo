# URL de conexión JDBC a MySQL
db.url=jdbc:mysql://localhost:3306/sumo_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true

# Usuario de la base de datos
db.usuario=root

# Contraseña de la base de datos
db.password=root
